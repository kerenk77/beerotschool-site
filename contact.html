<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>

Контакты — Онлайн школа "Беерот Ицхак"

</title>

<link rel="stylesheet" href="style.css">

<style>

/* ========================== */
/*         PAGE BG            */
/* ========================== */

body{

  margin:0;

  font-family:
    'Segoe UI',
    sans-serif;

  background:
    linear-gradient(
      180deg,
      #f5f9ff 0%,
      #edf4ff 100%
    );

  color:#173b74;

  overflow-x:hidden;
}

/* ========================== */
/*        CONTACT HERO        */
/* ========================== */

.contact-hero{

  width:min(1450px,94%);

  margin:
    2rem auto
    1.5rem;
}

.contact-hero-inner{

  position:relative;

  overflow:hidden;

  border-radius:38px;

  background:
    linear-gradient(
      135deg,
      #ffffff,
      #edf4ff
    );

  box-shadow:
    0 18px 50px rgba(0,0,0,.06);

  padding:
    4rem
    4rem;

  display:grid;

  grid-template-columns:
    1fr
    .9fr;

  gap:2rem;

  align-items:center;
}

/* DECOR */

.contact-hero-inner::before{

  content:"";

  position:absolute;

  top:-120px;
  left:-120px;

  width:320px;
  height:320px;

  border-radius:50%;

  background:
    radial-gradient(
      rgba(37,99,235,.12),
      transparent 70%
    );
}

.contact-hero-inner::after{

  content:"";

  position:absolute;

  bottom:-120px;
  right:-120px;

  width:340px;
  height:340px;

  border-radius:50%;

  background:
    radial-gradient(
      rgba(255,159,67,.15),
      transparent 70%
    );
}

/* ========================== */
/*        HERO CONTENT        */
/* ========================== */

.contact-content{

  position:relative;

  z-index:2;
}

.contact-badge{

  display:inline-flex;

  align-items:center;

  gap:.6rem;

  padding:
    .7rem
    1rem;

  background:#edf4ff;

  border-radius:999px;

  color:#2563eb;

  font-weight:700;

  margin-bottom:1.5rem;
}

.contact-badge span{

  font-size:1.2rem;
}

.contact-content h1{

  font-size:
    clamp(2.8rem,5vw,5rem);

  line-height:1.05;

  margin-bottom:1.2rem;

  color:#173b74;
}

.contact-content h1 span{

  color:#2563eb;
}

.contact-content p{

  font-size:1.12rem;

  line-height:1.8;

  color:#61708f;

  max-width:580px;

  margin-bottom:2rem;
}

/* ========================== */
/*        CONTACT BOXES       */
/* ========================== */

.contact-boxes{

  display:flex;

  flex-wrap:wrap;

  gap:1rem;
}

.contact-link{

  flex:1;

  min-width:220px;

  background:white;

  border-radius:24px;

  padding:
    1.2rem
    1.3rem;

  border:
    1px solid rgba(37,99,235,.08);

  box-shadow:
    0 10px 25px rgba(0,0,0,.04);

  transition:
    transform .25s ease,
    box-shadow .25s ease;

  display:flex;

  align-items:center;

  gap:1rem;
}

.contact-link:hover{

  transform:translateY(-4px);

  box-shadow:
    0 18px 35px rgba(0,0,0,.08);
}

.contact-icon{

  width:56px;
  height:56px;

  border-radius:18px;

  background:#edf4ff;

  display:flex;

  justify-content:center;

  align-items:center;

  font-size:1.5rem;

  color:#2563eb;

  flex-shrink:0;
}

.contact-link strong{

  display:block;

  color:#173b74;

  margin-bottom:.2rem;
}

.contact-link span{

  color:#61708f;

  font-size:.95rem;

  word-break:break-word;
}

/* ========================== */
/*         HERO IMAGE         */
/* ========================== */

.contact-image{

  position:relative;

  z-index:2;

  display:flex;

  justify-content:center;
}

.contact-image img{

  width:100%;

  max-width:560px;

  border-radius:32px;

  box-shadow:
    0 20px 45px rgba(0,0,0,.08);
}

/* ========================== */
/*            FORM            */
/* ========================== */

.contact-form-section{

  width:min(1100px,92%);

  margin:
    2rem auto
    5rem;
}

.contact-form-card{

  background:white;

  border-radius:36px;

  padding:
    3rem;

  box-shadow:
    0 18px 45px rgba(0,0,0,.06);
}

.contact-form-title{

  text-align:center;

  margin-bottom:2rem;
}

.contact-form-title h2{

  font-size:
    clamp(2rem,4vw,3rem);

  margin-bottom:.7rem;

  color:#173b74;
}

.contact-form-title p{

  color:#61708f;

  font-size:1.05rem;
}

/* FORM GRID */

.form-grid{

  display:grid;

  grid-template-columns:
    repeat(2,1fr);

  gap:1rem;
}

.form-group{

  display:flex;

  flex-direction:column;
}

.form-group.full{

  grid-column:1/-1;
}

.form-group label{

  margin-bottom:.5rem;

  color:#173b74;

  font-weight:600;
}

.form-group input,
.form-group textarea{

  width:100%;

  padding:
    1rem
    1.1rem;

  border-radius:18px;

  border:
    1px solid #dbe7ff;

  background:#f9fbff;

  font-size:1rem;

  transition:
    border .25s ease,
    box-shadow .25s ease;
}

.form-group input:focus,
.form-group textarea:focus{

  outline:none;

  border-color:#2563eb;

  box-shadow:
    0 0 0 4px rgba(37,99,235,.08);
}

.form-group textarea{

  resize:vertical;

  min-height:140px;
}

/* BUTTON */

.submit-btn{

  margin-top:1.5rem;

  width:100%;

  border:none;

  border-radius:999px;

  padding:
    1rem
    1.5rem;

  background:
    linear-gradient(
      135deg,
      #ffb347,
      #ff9327
    );

  color:white;

  font-size:1.05rem;

  font-weight:700;

  cursor:pointer;

  transition:
    transform .25s ease,
    box-shadow .25s ease;

  box-shadow:
    0 10px 25px rgba(255,147,39,.22);
}

.submit-btn:hover{

  transform:translateY(-2px);

  box-shadow:
    0 15px 32px rgba(255,147,39,.32);
}

/* RESPONSE */

#responseMessage{

  margin-top:1rem;

  text-align:center;

  color:#16a34a;

  font-weight:600;
}

/* ========================== */
/*         RESPONSIVE         */
/* ========================== */

@media(max-width:980px){

  .contact-hero-inner{

    grid-template-columns:1fr;

    padding:
      2.5rem
      2rem;
  }

  .contact-image{

    order:-1;
  }

  .contact-image img{

    max-width:420px;
  }

  .form-grid{

    grid-template-columns:1fr;
  }
}

@media(max-width:600px){

  .contact-hero{

    width:95%;
  }

  .contact-hero-inner{

    border-radius:28px;

    padding:
      2rem
      1.3rem;
  }

  .contact-form-card{

    border-radius:28px;

    padding:
      2rem
      1.2rem;
  }

  .contact-content h1{

    font-size:2.4rem;
  }

  .contact-link{

    min-width:100%;
  }

  .contact-image img{

    border-radius:24px;
  }
}

</style>

</head>

<body>

<header id="siteHeader"></header>

<script src="menu.js"></script>

<!-- HERO -->

<section class="contact-hero">

  <div class="contact-hero-inner">

    <div class="contact-content">

      <div class="contact-badge">

        <span>✦</span>

        Онлайн школа Беерот Ицхак

      </div>

      <h1>

        Свяжитесь <span>с нами</span>

      </h1>

      <p>

        Есть вопросы о занятиях,
        расписании или записи?
        Мы с радостью поможем вам
        и ответим как можно скорее.

      </p>

      <div class="contact-boxes">

        <a class="contact-link"
           href="mailto:k025804524@gmail.com">

          <div class="contact-icon">

            ✉

          </div>

          <div>

            <strong>Email</strong>

            <span>

              k025804524@gmail.com

            </span>

          </div>

        </a>

        <a class="contact-link"
           href="https://wa.me/972534712101"
           target="_blank">

          <div class="contact-icon">

            ☏

          </div>

          <div>

            <strong>WhatsApp</strong>

            <span>

              +972 53-471-2101

            </span>

          </div>

        </a>

      </div>

    </div>

    <div class="contact-image">

      <img src="hero-banner.jpg"
           alt="Онлайн школа">

    </div>

  </div>

</section>

<!-- FORM -->

<section class="contact-form-section">

  <div class="contact-form-card">

    <div class="contact-form-title">

      <h2>

        Напишите нам

      </h2>

      <p>

        Оставьте сообщение —
        и мы обязательно свяжемся с вами

      </p>

    </div>

    <form action="https://formspree.io/f/xwpnkkle"
          method="POST">

      <div class="form-grid">

        <div class="form-group">

          <label>

            Ваше имя

          </label>

          <input type="text"
                 name="name"
                 required>

        </div>

        <div class="form-group">

          <label>

            Email

          </label>

          <input type="email"
                 name="email"
                 required>

        </div>

        <div class="form-group full">

          <label>

            Телефон / WhatsApp

          </label>

          <input type="tel"
                 name="phone"
                 required>

        </div>

        <div class="form-group full">

          <label>

            Сообщение

          </label>

          <textarea name="message"></textarea>

        </div>

      </div>

      <button type="submit"
              class="submit-btn">

        Отправить сообщение

      </button>

    </form>

    <p id="responseMessage"></p>

  </div>

</section>

<script>

const form =
document.querySelector('form');

const msg =
document.getElementById(
'responseMessage'
);

form.addEventListener(
'submit',
() => {

msg.textContent =
'Сообщение успешно отправлено!';

});

</script>

</body>
</html>
